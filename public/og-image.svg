<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Arka plan -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo kutusu -->
  <rect x="375" y="120" width="130" height="130" rx="32" fill="url(#logoGrad)"/>

  <!-- Dalga 1 -->
  <path d="M392 178 C408 152, 428 152, 440 162 C452 172, 472 172, 488 152" stroke="white" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.95"/>
  <!-- Dalga 2 -->
  <path d="M392 196 C408 170, 428 170, 440 180 C452 190, 472 190, 488 170" stroke="white" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Dalga 3 -->
  <path d="M392 214 C408 188, 428 188, 440 198 C452 208, 472 208, 488 188" stroke="white" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- "Lux" metni -->
  <text x="530" y="207" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="800" fill="white" letter-spacing="-2">Lux</text>
  <!-- "Social" metni (gradient renk) -->
  <text x="655" y="207" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="800" fill="url(#textGrad)" letter-spacing="-2">Social</text>

  <!-- Alt URL -->
  <text x="600" y="258" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#64748b" text-anchor="middle">luxsocialtr.com</text>

  <!-- Ayırıcı çizgi -->
  <rect x="500" y="295" width="200" height="2" rx="1" fill="#1e3a5f" opacity="0.6"/>

  <!-- Platform listesi -->
  <text x="600" y="355" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">TikTok · Instagram · YouTube · Twitter · Facebook</text>

  <!-- Rozet -->
  <rect x="350" y="390" width="500" height="54" rx="27" fill="#0ea5e9" fill-opacity="0.12" stroke="#0ea5e9" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="600" y="424" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#38bdf8" text-anchor="middle" font-weight="600">✦  Ücretsiz &amp; Filigransız Video İndirme</text>
</svg>
